<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad_package" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5E3C" />
      <stop offset="100%" stop-color="#6D3A1A" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#grad_package)" />
  <g transform="translate(200, 130)" filter="url(#shadow)">
    <!-- Box containing items -->
    <rect x="-35" y="-5" width="70" height="35" rx="4" fill="#E5D3B3"/>
    <!-- Flaps -->
    <polygon points="-35,-5 -45,-15 -25,-15 -25,-5" fill="#C5B393"/>
    <polygon points="35,-5 45,-15 25,-15 25,-5" fill="#C5B393"/>
    <!-- Items sticking out -->
    <rect x="-20" y="-30" width="12" height="25" fill="#2ECC71"/> <!-- Sugar bag -->
    <rect x="5" y="-35" width="15" height="30" fill="#F1C40F"/> <!-- Oil bottle -->
    <circle cx="12" cy="-35" r="4" fill="#F1C40F"/>
    <rect x="-5" y="-20" width="10" height="15" fill="#E74C3C"/> <!-- Instant noodles -->
  </g>
  <text x="200" y="235" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="1">PAKET SEMBAKO BERKAH</text>
  <text x="200" y="260" fill="rgba(255, 255, 255, 0.75)" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="500" text-anchor="middle">Isi: Beras, Minyak, Gula, Teh, Mie Instan</text>
</svg>
