<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="map_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAEAEA" />
      <stop offset="100%" stop-color="#D6D6D6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" rx="12" fill="url(#map_bg)" />
  
  <!-- Grid lines for map effect -->
  <g stroke="#CCCCCC" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    
    <line x1="80" y1="0" x2="80" y2="250"/>
    <line x1="160" y1="0" x2="160" y2="250"/>
    <line x1="240" y1="0" x2="240" y2="250"/>
    <line x1="320" y1="0" x2="320" y2="250"/>
  </g>

  <!-- Roads -->
  <path d="M 0,120 Q 200,140 400,120" fill="none" stroke="#FFFFFF" stroke-width="24" opacity="0.9"/>
  <path d="M 180,0 L 220,250" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.9"/>

  <!-- Block buildings -->
  <rect x="30" y="30" width="80" height="50" rx="6" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="270" y="20" width="100" height="60" rx="6" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="40" y="160" width="90" height="60" rx="6" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="260" y="150" width="110" height="70" rx="6" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Store Pin Location -->
  <g transform="translate(200, 110)" filter="url(#shadow)">
    <!-- Red Pin -->
    <path d="M 0,0 C -12,-12 -18,-24 -18,-36 C -18,-50 -8,-58 0,-58 C 8,-58 18,-50 18,-36 C 18,-24 12,-12 0,0 Z" fill="#B8382C"/>
    <!-- Inner White Circle -->
    <circle cx="0" cy="-38" r="8" fill="#FFFFFF"/>
    <!-- Store symbol inside pin -->
    <path d="M -4,-36 L 4,-36 L 4,-40 L -4,-40 Z" fill="#B8382C"/>
    <path d="M -5,-40 L 0,-44 L 5,-40 Z" fill="#B8382C"/>
  </g>
</svg>
