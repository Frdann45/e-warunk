<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad_gulaku" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71" />
      <stop offset="100%" stop-color="#27AE60" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#grad_gulaku)" />
  <g transform="translate(200, 130)" filter="url(#shadow)">
    <!-- Bag shape -->
    <path d="M-20,-20 L20,-20 L25,25 C25,30 -25,30 -25,25 Z" fill="#FFFFFF"/>
    <path d="M-20,-20 L-25,-30 L25,-30 L20,-20 Z" fill="#F1C40F"/>
    <text x="0" y="10" fill="#27AE60" font-family="sans-serif" font-size="12" font-weight="900" text-anchor="middle">GULA</text>
  </g>
  <text x="200" y="235" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="1">GULA PASIR GULAKU</text>
  <text x="200" y="260" fill="rgba(255, 255, 255, 0.75)" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="500" text-anchor="middle">Gula Pasir Gulaku 1kg</text>
</svg>
