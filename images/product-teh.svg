<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad_teh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E74C3C" />
      <stop offset="100%" stop-color="#D35400" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#grad_teh)" />
  <g transform="translate(200, 135)" filter="url(#shadow)">
    <!-- Tea cup shape -->
    <path d="M-25,-15 L25,-15 C25,15 -25,15 -25,-15" fill="#FFFFFF"/>
    <!-- Handle -->
    <path d="M25,-5 C35,-5 35,5 25,5" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <!-- Tea bag string -->
    <path d="M0,-15 L-10,-35" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Tea tag -->
    <rect x="-15" y="-42" width="10" height="8" rx="2" fill="#F1C40F"/>
  </g>
  <text x="200" y="235" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="1">TEH CELUP PREMIUM</text>
  <text x="200" y="260" fill="rgba(255, 255, 255, 0.75)" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="500" text-anchor="middle">Teh Celup Premium 25s</text>
</svg>
