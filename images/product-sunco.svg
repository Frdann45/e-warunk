<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad_sunco" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F39C12" />
      <stop offset="100%" stop-color="#D35400" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#grad_sunco)" />
  <g transform="translate(200, 130)" filter="url(#shadow)">
    <!-- Oil bottle/drop shape -->
    <path d="M-15,30 C-15,40 15,40 15,30 L10,-10 C10,-20 -10,-20 -10,-10 Z" fill="#FFFFFF"/>
    <circle cx="0" cy="-25" r="5" fill="#FFFFFF"/>
    <path d="M-5,-5 L5,-5 L5,15 L-5,15 Z" fill="#F1C40F"/>
  </g>
  <text x="200" y="235" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="1">MINYAK SUNCO</text>
  <text x="200" y="260" fill="rgba(255, 255, 255, 0.75)" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="500" text-anchor="middle">Minyak Goreng SunCo 2L</text>
</svg>
