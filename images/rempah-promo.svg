<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad_rempah" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0392B" />
      <stop offset="100%" stop-color="#7D3C98" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#grad_rempah)" />
  <g transform="translate(200, 130)" filter="url(#shadow)">
    <!-- Plate/bowls of spices -->
    <circle cx="0" cy="0" r="35" fill="#E5D3B3"/>
    <circle cx="-12" cy="-10" r="12" fill="#E67E22"/> <!-- Chili powder -->
    <circle cx="12" cy="-10" r="12" fill="#F1C40F"/> <!-- Turmeric -->
    <circle cx="0" cy="12" r="14" fill="#8E44AD"/> <!-- Cloves -->
  </g>
  <text x="200" y="235" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="1">REMPAH NUSANTARA</text>
  <text x="200" y="260" fill="rgba(255, 255, 255, 0.75)" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="500" text-anchor="middle">Lada, Ketumbar, Kayu Manis &amp; Cengkeh</text>
</svg>
