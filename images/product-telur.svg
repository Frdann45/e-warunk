<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad_telur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E29B65" />
      <stop offset="100%" stop-color="#A0522D" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#grad_telur)" />
  <g transform="translate(200, 130)" filter="url(#shadow)">
    <!-- Bowl with eggs -->
    <path d="M-30,0 C-30,25 30,25 30,0 Z" fill="#FFFFFF"/>
    <ellipse cx="-12" cy="-8" rx="10" ry="12" fill="#FAF0E6"/>
    <ellipse cx="12" cy="-8" rx="10" ry="12" fill="#FDF5E6"/>
    <ellipse cx="0" cy="-14" rx="11" ry="14" fill="#FFE4C4"/>
  </g>
  <text x="200" y="235" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="1">TELUR AYAM NEGERI</text>
  <text x="200" y="260" fill="rgba(255, 255, 255, 0.75)" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="500" text-anchor="middle">Telur Ayam Negeri 1kg</text>
</svg>
