<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad_tepung" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498DB" />
      <stop offset="100%" stop-color="#2980B9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#grad_tepung)" />
  <g transform="translate(200, 130)" filter="url(#shadow)">
    <!-- Bag with wheat/triangle -->
    <path d="M-20,-25 L20,-25 L25,25 C25,30 -25,30 -25,25 Z" fill="#FFFFFF"/>
    <!-- Blue triangle logo -->
    <polygon points="0,-10 -12,10 12,10" fill="#2980B9"/>
  </g>
  <text x="200" y="235" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="1">TEPUNG SEGITIGA BIRU</text>
  <text x="200" y="260" fill="rgba(255, 255, 255, 0.75)" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="500" text-anchor="middle">Tepung Terigu Segitiga Biru 1kg</text>
</svg>
